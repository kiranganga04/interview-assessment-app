spring:
  datasource:
    url: jdbc:h2:mem:interview_assessment_test;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        # candidates.current_role collides with H2's built-in CURRENT_ROLE keyword (an ANSI SQL
        # session function), which fails DDL generation with "expected identifier" and then
        # cascades into every other table failing to create (interviews' FK to candidates,
        # etc.). Quoting every identifier sidesteps the collision without touching the real
        # MySQL schema/column names, which don't have this reserved-word problem.
        globally_quoted_identifiers: true

app:
  cors:
    allowed-origins: http://localhost:5173
  file-storage:
    directory: build/test-uploads
